logging:
  level:
    root: INFO

jwt:
    secret: ${JWT_SECRET:your_secret_key_that_is_super_secret_and_long_enough_for_jwt_signing}
    expiration: 18000000 # 5 hours in milliseconds

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/sports_folio
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

otp:
  validity:
    minutes: 10
